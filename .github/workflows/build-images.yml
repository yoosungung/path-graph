name: Build and push images

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: pipeline/Dockerfile
            image: pipeline

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: imagetags
        run: |
          owner="${{ github.repository_owner }}"
          sha="${{ github.sha }}"
          tags="ghcr.io/${owner}/path-graph/${{ matrix.image }}:${sha}"
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            tags="${tags},ghcr.io/${owner}/path-graph/${{ matrix.image }}:${{ github.event.release.tag_name }}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: |
            RHWP_BATCH_VERSION=0.7.15
          tags: ${{ steps.imagetags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
