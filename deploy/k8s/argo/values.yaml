# Argo Workflows — dev cluster (k3s). Cluster-scoped controller watches all namespaces.
# Install: ./scripts/install-argo.sh

crds:
  # Minified CRDs avoid pre-install hook (GitHub download) on air-gapped clusters.
  full: false

controller:
  metricsConfig:
    enabled: false
  workflowDefaults:
    spec:
      serviceAccountName: path-graph-pipeline

server:
  enabled: true
  serviceType: ClusterIP
  secure: false
  authModes:
    - server
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - argo.k8s-test
    paths:
      - /
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
      nginx.ingress.kubernetes.io/proxy-send-timeout: "300"

executor:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
