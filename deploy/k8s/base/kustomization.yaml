apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: path-graph
labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: path-graph
    includeSelectors: false
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - backend-pipeline-rbac.yaml
  - configmap-limits.yaml
  - configmap-artifact-repositories.yaml
  - networkpolicy.yaml
  - filestash.yaml
  - filestash-ingress.yaml
  - filestash-networkpolicy.yaml
  - workflow-templates/pipeline-ingest-rag.yaml
  - workflow-templates/pipeline-collect-ingest-rag.yaml
  - workflow-templates/pipeline-graph.yaml
  - workflow-templates/pipeline-wiki.yaml
  - workflow-templates/pipeline-graphrag.yaml
  - workflow-templates/pipeline-purge-document.yaml
  - workflow-templates/pipeline-purge-project.yaml
  - workflow-templates/pipeline-delete-project.yaml
  - workflow-templates/pipeline-reconcile-index.yaml
  - workflow-templates/pipeline-artifact-cleanup.yaml
configMapGenerator:
  - name: filestash-init
    files:
      - render-filestash-config.sh
    options:
      disableNameSuffixHash: true
