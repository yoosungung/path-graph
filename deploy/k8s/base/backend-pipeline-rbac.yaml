# Backend (runtime NS) → path-graph NS: CronWorkflow + credential Secret reconcile.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-pipeline-argo
  namespace: path-graph
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["workflows", "cronworkflows"]
    verbs: ["create", "update", "patch", "delete", "get", "list", "replace"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "delete", "get", "replace"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-pipeline-argo
  namespace: path-graph
subjects:
  - kind: ServiceAccount
    name: backend
    namespace: runtime
roleRef:
  kind: Role
  name: backend-pipeline-argo
  apiGroup: rbac.authorization.k8s.io
