# Initial Filestash config: S3 backend only (Garage). Credentials entered at login or /admin.
apiVersion: v1
kind: ConfigMap
metadata:
  name: filestash-seed-config
  labels:
    app.kubernetes.io/name: filestash
    app.kubernetes.io/component: filestash
data:
  config.json: |
    {
      "connections": [
        {
          "type": "s3",
          "label": "Garage S3"
        }
      ],
      "general": {
        "host": ""
      }
    }
