# Filestash → runtime/garage-s3:3900 (dev Garage browser UI).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: filestash-egress
  labels:
    app.kubernetes.io/name: filestash
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: filestash
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: runtime
      ports:
        - protocol: TCP
          port: 3900
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
      ports:
        - protocol: TCP
          port: 3900
