apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pipeline-graphrag
  namespace: path-graph
spec:
  serviceAccountName: path-graph-pipeline
  imagePullSecrets:
    - name: registry-creds
  entrypoint: graphrag
  arguments:
    parameters:
      - name: tenant
      - name: project_id
      - name: project_slug
      - name: batch_id
      - name: chunks_key
      - name: skip_agent
        value: "0"
  synchronization:
    semaphore:
      configMapKeyRef:
        name: path-graph-limits
        key: agent-invoke
  templates:
    - name: graphrag
      steps:
        - - name: run-graphrag
            template: graphrag-step
    - name: graphrag-step
      container:
        image: path-graph/pipeline:0.0.0
        imagePullPolicy: IfNotPresent
        command: [python, -c]
        args:
          - |
            from path_graph.steps.graphrag_pipeline import run_graphrag_pipeline
            import os, json
            result = run_graphrag_pipeline(
                os.environ["TENANT"],
                os.environ["PROJECT_ID"],
                os.environ["PROJECT_SLUG"],
                os.environ["BATCH_ID"],
                os.environ["CHUNKS_KEY"],
                os.environ.get("SESSION_ID", "graphrag-session"),
                skip_agent=os.environ.get("SKIP_AGENT", "0") == "1",
            )
            print(json.dumps({
                "community_count": sum(c.get("community_count", 0) for c in result["communities"]),
                "wiki_count": len(result["wiki"].get("communities", [])),
            }))
        env:
          - name: TENANT
            value: "{{workflow.parameters.tenant}}"
          - name: PROJECT_ID
            value: "{{workflow.parameters.project_id}}"
          - name: PROJECT_SLUG
            value: "{{workflow.parameters.project_slug}}"
          - name: BATCH_ID
            value: "{{workflow.parameters.batch_id}}"
          - name: CHUNKS_KEY
            value: "{{workflow.parameters.chunks_key}}"
          - name: SKIP_AGENT
            value: "{{workflow.parameters.skip_agent}}"
        envFrom:
          - secretRef:
              name: path-graph-env
        resources:
          limits:
            memory: 4Gi
      activeDeadlineSeconds: 7200
