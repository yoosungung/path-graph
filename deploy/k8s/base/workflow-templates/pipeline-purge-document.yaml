apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pipeline-purge-document
  namespace: path-graph
spec:
  serviceAccountName: path-graph-pipeline
  imagePullSecrets:
    - name: registry-creds
  entrypoint: purge
  arguments:
    parameters:
      - name: tenant
      - name: project_id
      - name: document_id
      - name: reason
        value: ""
      - name: hard_raw
        value: "false"
  templates:
    - name: purge
      container:
        image: path-graph/pipeline:0.0.0
        imagePullPolicy: IfNotPresent
        command: [python, -m, path_graph.steps.purge_step]
        args:
          - --tenant
          - "{{workflow.parameters.tenant}}"
          - --project-id
          - "{{workflow.parameters.project_id}}"
          - --scope
          - document
          - --document-id
          - "{{workflow.parameters.document_id}}"
          - --reason
          - "{{workflow.parameters.reason}}"
        envFrom:
          - secretRef:
              name: path-graph-env
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
      activeDeadlineSeconds: 600
