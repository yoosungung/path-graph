apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pipeline-reconcile-index
  namespace: path-graph
spec:
  serviceAccountName: path-graph-pipeline
  imagePullSecrets:
    - name: registry-creds
  entrypoint: reconcile
  arguments:
    parameters:
      - name: tenant
      - name: project_id
  templates:
    - name: reconcile
      container:
        image: path-graph/pipeline:latest
        imagePullPolicy: Always
        command: [python, -m, path_graph.steps.reconcile_step]
        args:
          - --tenant
          - "{{workflow.parameters.tenant}}"
          - --project-id
          - "{{workflow.parameters.project_id}}"
        envFrom:
          - secretRef:
              name: path-graph-env
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi
      activeDeadlineSeconds: 1800
