apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pipeline-ingest-rag
  namespace: path-graph
spec:
  serviceAccountName: path-graph-pipeline
  imagePullSecrets:
    - name: registry-creds
  entrypoint: ingest-rag
  arguments:
    parameters:
      - name: tenant
      - name: batch_manifest
        value: ""
      - name: batch_manifest_key
        value: ""
      - name: rag
        value: "true"
  synchronization:
    semaphore:
      configMapKeyRef:
        name: path-graph-limits
        key: embed
  parallelism: 10
  podGC:
    strategy: OnPodCompletion
    deleteDelayDuration: 60s
  ttlStrategy:
    secondsAfterCompletion: 600
    secondsAfterFailure: 7200
  templates:
    - name: ingest-rag
      steps:
        - - name: resolve-manifest
            template: resolve-manifest
            arguments:
              parameters:
                - name: batch_manifest
                  value: "{{workflow.parameters.batch_manifest}}"
                - name: batch_manifest_key
                  value: "{{workflow.parameters.batch_manifest_key}}"
        - - name: map-ingest
            template: ingest-one
            arguments:
              parameters:
                - name: tenant
                  value: "{{workflow.parameters.tenant}}"
                - name: manifest_line
                  value: "{{item}}"
            withParam: "{{steps.resolve-manifest.outputs.parameters.batch_manifest}}"
    - name: resolve-manifest
      inputs:
        parameters:
          - name: batch_manifest
          - name: batch_manifest_key
      container:
        image: path-graph/pipeline:0.0.0
        imagePullPolicy: IfNotPresent
        command: [python, -m, path_graph.steps.load_batch_manifest]
        args:
          - --tenant
          - "{{workflow.parameters.tenant}}"
          - --manifest-key
          - "{{inputs.parameters.batch_manifest_key}}"
          - --batch-manifest
          - "{{inputs.parameters.batch_manifest}}"
          - --output
          - /tmp/batch_manifest.json
        envFrom:
          - secretRef:
              name: path-graph-env
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      outputs:
        parameters:
          - name: batch_manifest
            valueFrom:
              path: /tmp/batch_manifest.json
    - name: ingest-one
      inputs:
        parameters:
          - name: tenant
          - name: manifest_line
      container:
        image: path-graph/pipeline:0.0.0
        imagePullPolicy: IfNotPresent
        command: [sh, -c]
        args:
          - |
            set -eu
            rag_flag=""
            if [ "$RAG" = "true" ]; then rag_flag="--rag"; fi
            exec python -m path_graph.steps.ingest_manifest --tenant "$TENANT" $rag_flag
        env:
          - name: TENANT
            value: "{{inputs.parameters.tenant}}"
          - name: MANIFEST_LINE
            value: "{{inputs.parameters.manifest_line}}"
          - name: RAG
            value: "{{workflow.parameters.rag}}"
        envFrom:
          - secretRef:
              name: path-graph-env
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 4Gi
      activeDeadlineSeconds: 3600
      retryStrategy:
        limit: 2
      continueOn:
        failed: true
