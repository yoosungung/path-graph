# Helm values for Qdrant vector database (test environment).
# Chart: https://github.com/qdrant/qdrant-helm
# Ops: deploy/SETUP.md; scripts/test-qdrant-config.sh, scripts/verify-qdrant.sh

replicaCount: 1

image:
  pullPolicy: IfNotPresent
  # tag: v1.18.2   # uncomment to pin Qdrant version

# Single-node test: disable Raft cluster mode.
config:
  cluster:
    enabled: false

persistence:
  enabled: true
  size: 8Gi
  storageClassName: local-path

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 2Gi

# Test-only API key; override at deploy time via QDRANT_API_KEY in deploy-qdrant-nebula.sh.
apiKey: "test-qdrant-api-key"
