# Fragment — merge into shared ingress-nginx values (e.g. test_infra helm/values/ingress-nginx.yaml).
# Qdrant REST :6333 and Nebula Studio :7001 use HTTP Ingress via socat → nginx :80.
# Qdrant gRPC :6334 uses TCP stream passthrough.

tcp:
  6334: "qdrant/qdrant:6334"

