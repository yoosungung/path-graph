# Ingress routes for NebulaGraph Studio (host *.k8s-test).
# Requires ingress-nginx with socat hostPort 7001 — see ingress-nginx-nebula.snippet.yaml

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nebula-studio
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-studio
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: nebula-studio.k8s-test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nebula-studio
                port:
                  number: 7001
