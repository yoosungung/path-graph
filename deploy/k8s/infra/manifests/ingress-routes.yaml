# Ingress routes for Qdrant REST and NebulaGraph Studio (host *.k8s-test).
# Requires ingress-nginx with socat hostPort 6333/7001 — see ingress-nginx-qdrant-nebula.snippet.yaml

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: qdrant
  namespace: qdrant
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "32m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: qdrant.k8s-test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: qdrant
                port:
                  number: 6333

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nebula-studio
  namespace: nebula
  labels:
    app.kubernetes.io/name: nebula-studio
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: nebula-studio.k8s-test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nebula-studio
                port:
                  number: 7001
